<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

<div class="login-container">

  <div class="login-card shadow">

    <div class="text-center mb-3">
      <a href="index.html" class="btn btn-outline-secondary">← Voltar ao Início</a>
    </div>

    <h2 class="text-center mb-3">🍽 Restaurante</h2>
    <p class="text-center text-muted mb-4">Acesse sua conta</p>

    <form id="loginForm">
      <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

      <input type="password" id="senha" class="form-control mb-3" placeholder="Senha" required>

      <button class="btn btn-primary w-100">Entrar</button>
    </form>

    <div class="text-center mt-3">
      <small>Não tem conta? <a href="cadastro.html">Cadastrar</a></small>
    </div>

  </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
