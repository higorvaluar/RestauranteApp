<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Minhas Reservas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .reserva-card {
      border-left: 4px solid #d32f2f;
      transition: transform 0.2s;
    }
    
    .reserva-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .codigo-confirmacao {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      user-select: all;
    }

    .codigo-confirmacao:hover {
      filter: brightness(1.1);
    }

    .mesa-seletor {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    .mesa-btn {
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .mesa-btn:hover {
      border-color: #d32f2f;
      background: #ffebee;
    }

    .mesa-btn.active {
      background: #d32f2f;
      color: white;
      border-color: #d32f2f;
    }

    .mesa-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #f5f5f5;
    }

    .horario-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    .horario-btn {
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .horario-btn.active {
      background: #d32f2f;
      color: white;
      border-color: #d32f2f;
    }

    .alert-custom {
      border-radius: 8px;
      margin-top: 15px;
    }

    .section-reserva {
      margin-bottom: 40px;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #d32f2f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status-badge {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .status-ativa {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status-confirmada {
      background: #e3f2fd;
      color: #1565c0;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container d-flex justify-content-between align-items-center">
    <a href="pedidos.html" class="navbar-brand">← Meus Pedidos</a>
    <span class="navbar-brand">🍽 Minhas Reservas</span>
    <span id="usuario-nome-reserva" class="text-white small"></span>
  </div>
</nav>

<div class="container mt-4 mb-5">

  <!-- SESSÃO DE NOVA RESERVA -->
  <div id="nova-reserva" class="section-reserva">
    <h3 class="mb-4"><i class="fas fa-calendar-check"></i> Nova Reserva</h3>

    <div class="card shadow-sm p-4">
      <!-- Data -->
      <div class="row">
        <div class="col-md-6">
          <label for="data-reserva" class="form-label fw-bold">Data da Reserva</label>
          <input 
            type="date" 
            id="data-reserva" 
            class="form-control" 
            required
          >
          <small class="text-muted">Mínimo 1 dia no futuro</small>
        </div>

        <!-- Pessoas -->
        <div class="col-md-6">
          <label for="quantidade-pessoas" class="form-label fw-bold">Número de Pessoas</label>
          <div class="input-group">
            <button type="button" class="btn btn-outline-secondary" onclick="diminuirPessoas()">−</button>
            <input 
              type="number" 
              id="quantidade-pessoas" 
              class="form-control text-center" 
              value="2" 
              min="1" 
              max="10" 
              readonly
            >
            <button type="button" class="btn btn-outline-secondary" onclick="aumentarPessoas()">+</button>
          </div>
        </div>
      </div>

      <!-- Horários -->
      <div class="mt-4">
        <label class="form-label fw-bold">Horário (período 19h - 22h)</label>
        <div class="horario-grid" id="horarios-disponiveis">
          <!-- Preenchido por JS -->
        </div>
      </div>

      <!-- Mesas Disponíveis -->
      <div class="mt-4">
        <label class="form-label fw-bold">Mesas Disponíveis</label>
        <div class="mesa-seletor" id="mesas-disponiveis">
          <p class="text-muted">Selecione data e horário primeiro...</p>
        </div>
      </div>

      <!-- Mensagens de erro/sucesso -->
      <div id="msg-container"></div>

      <!-- Botão de Reserva -->
      <div class="mt-4">
        <button 
          type="button" 
          class="btn btn-danger btn-lg w-100" 
          onclick="criarReserva()"
          id="btn-reservar"
        >
          <i class="fas fa-check-circle"></i> Confirmar Reserva
        </button>
      </div>
    </div>
  </div>

  <!-- DIVISOR -->
  <hr class="my-5">

  <!-- MINHAS RESERVAS -->
  <div class="section-reserva">
    <h3 class="mb-4"><i class="fas fa-history"></i> Minhas Reservas</h3>

    <div id="reservas-container">
      <div class="text-center">
        <div class="loading"></div>
        <p class="mt-3 text-muted">Carregando suas reservas...</p>
      </div>
    </div>
  </div>

</div>

<footer class="text-center mt-5 p-4 bg-dark text-white">
  <p class="mb-0">🍥 Konoha's © 2026 - Sabores que despertam o seu chakra</p>
</footer>

<script src="js/api.js"></script>
<script src="js/reservas.js"></script>

</body>
</html>
