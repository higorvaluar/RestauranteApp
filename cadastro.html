<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

<div class="login-container">

  <div class="login-card shadow">

    <h2 class="text-center mb-3">🍽 Restaurante</h2>
    <p class="text-center text-muted mb-4">Crie sua conta</p>

    <form id="cadastroForm">

      <input type="text" id="nome" class="form-control mb-3" placeholder="Nome completo" required>

      <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

      <input type="password" id="senha" class="form-control mb-3" placeholder="Senha" required>

      <input type="password" id="confirmarSenha" class="form-control mb-3" placeholder="Confirmar senha" required>

      <input type="text" id="telefone" class="form-control mb-3" placeholder="Telefone" required>

      <button class="btn btn-primary w-100">Cadastrar</button>

    </form>

    <div class="text-center mt-3">
      <small>Já tem conta? <a href="login.html">Entrar</a></small>
    </div>

  </div>

</div>

<script src="js/api.js"></script>
<script src="js/cadastro.js"></script>

</body>
</html>
